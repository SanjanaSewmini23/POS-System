<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S&S Payment Details</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="css/payment.css">
</head>
<body>

<div class="container">
    <div class="sidebar">
        <img src="assests/logo.png" class="logo" alt="S&S Logo">
        <ul>
            <li id="navDashboard"> 
                <i class="fas fa-tachometer-alt"></i> Dashboard 
            </li>
            <li id="navProduct">
                <i class="fa fa-box"></i> Product Range
            </li>
            <li id="navCustomer">
                <i class="fa fa-user"></i> Customer Manage
            </li>
            <li id="navStock">
                <i class="fa fa-cubes"></i> Stock Manage
            </li>
            <li class="active" id="navOrder">
                <i class="fa fa-shopping-cart"></i> Order Manage
            </li>
            
        </ul>
    </div>

    <div class="main">
        <div class="top-icons">
             <i class="fa fa-globe" id="btnGlobe" style="cursor: pointer;" title="Language"></i>
            <i class="fa fa-gear" id="btnSetting" style="cursor: pointer;" title="Setting"></i>
            <i class="fas fa-sign-out-alt" id="btnLogout" style="cursor: pointer;" title="Logout"></i>
        </div>

        <h1>Payment Details</h1>

        <div class="payment-card">
             <div class="input-group">
                <label for="date">Date</label>
                <input type="text" id="date" readonly value="-">
            </div>
             <div class="input-group">
                <label for="pId">Order ID</label>
                <input type="text" id="pId" readonly value="-">
            </div>
            <div class="input-group">
                <label for="pTotal">Total (Rs.)</label>
                <input type="text" id="pTotal" readonly value="0.00">
            </div>
            <div class="input-group">
                <label for="pSubTotal">Sub Total (Rs.)</label>
                <input type="text" id="pSubTotal" readonly value="0.00">
            </div>
            <div class="input-group">
                <label for="pDiscount">Discount (%)</label>
                <input type="number" id="pDiscount" placeholder="Enter Percentage">
            </div>
            <div class="input-group">
                <label for="pBalance">Balance (Rs.)</label>
                <input type="text" id="pBalance" readonly value="0.00">
            </div>
            <div class="input-group">
                <label for="pMethod">Payment Method</label>
                <select id="pMethod">
                    <option value="Cash">Cash</option>
                    <option value="Card">Card</option>
                </select>
            </div>

            <div class="btn-group">
                <button type="button" class="btn" id="btnPurchase">Purchase</button>
                <button type="button" class="btn" id="btnPrintReceipt">Print Receipt</button>
            </div>
        </div>
    </div>
</div>

<script type="module" src="controllers/paymentController.js"></script>

</body>
</html>
