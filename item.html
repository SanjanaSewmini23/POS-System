<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S&S Stock Manage</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="css/item.css">
</head>
<body>

<div class="container">
   <div class="sidebar">
    <img src="assests/logo.png" class="logo" alt="S&S Logo">

    <ul>
        <li id="navDashboard"> 
            <i class="fas fa-tachometer-alt"></i> Dashboard 
        </li>
        <li id="navProduct">
            <i class="fa fa-box"></i> Product Range
        </li>
        <li id="navCustomer">
            <i class="fa fa-user"></i> Customer Manage
        </li>
        <li class="active" id="navStock">
            <i class="fa fa-cubes"></i> Stock Manage
        </li>
        <li id="navOrder">
            <i class="fa fa-shopping-cart"></i> Order Manage
        </li>
        
    </ul>
</div>

    <div class="main">
        <div class="top-icons">
            <div class="search-bar">
                <input type="text" id="searchItem" placeholder="Search item">
                <i class="fa fa-search"></i>
            </div>
                <i class="fa fa-globe" id="btnGlobe" style="cursor: pointer;" title="Language"></i>
                <i class="fa fa-gear" id="btnSetting" style="cursor: pointer;" title="Setting"></i>
                <i class="fas fa-sign-out-alt" id="btnLogout" style="cursor: pointer;" title="Logout"></i>
            </div>

        <h1>Stock Management</h1>

        <div class="input-form">
            <div class="input-group">
                <div class="field">
                    <label for="itemCode">Item Code</label>
                    <input type="text" id="itemCode">
                </div>
                <div class="field">
                    <label for="itemName">Item Name</label>
                    <input type="text" id="itemName">
                </div>
            </div>
            <div class="input-group">
                <div class="field">
                    <label for="qty">Quantity</label>
                    <input type="number" id="qty">
                </div>
                <div class="field">
                    <label for="unitPrice">Unit Price</label>
                    <input type="text" id="unitPrice">
                </div>
            </div>
        </div>

        <div class="btn-container">
            <button class="btn" id="btnSaveStock">Save</button>
            <button class="btn" id="btnUpdateStock">Update</button>
            <button class="btn" id="btnDeleteStock">Delete</button>
            <button class="btn" id="btnResetStock">Reset</button>
        </div>

        <div class="table-box">
            <table id="stockTable">
                <thead>
                    <tr>
                        <th>Code</th>
                        <th>Name</th>
                        <th>Qty</th>
                        <th>Unit Price</th>
                    </tr>
                </thead>
                <tbody>
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script type="module" src="controllers/itemController.js"></script>
</body>
</html>
