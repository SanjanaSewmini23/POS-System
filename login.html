<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>S&S Login</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

<div class="container">
    
    <div class="logo">
        <img src="assests/logo.png" alt="Bakery Logo">
    </div>

    <h1>USER LOGIN</h1>

    <div class="login-box">
    <form id="loginForm">
        <label>USERNAME</label>
        <input type="text" id="username" placeholder="Enter username" required>

        <label>PASSWORD</label>
        <input type="password" id="password" placeholder="Enter password" required>

        <p id="error-message" style="color: red; font-size: 14px; display: none; margin-bottom: 10px;">
            Invalid Username or Password!
        </p>

        <button type="submit">LOG IN</button>

        <p class="links">
            Forgot password ? <br>
            <span>Register</span>
        </p>
    </form>
</div>

</div>


<script type="module" src="controllers/loginController.js"></script>
</body>
</html>
